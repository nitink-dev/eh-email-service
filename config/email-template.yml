email:
  templates:
    MAX_RETRIES_REACHED:
      subject: 'Enrichment Notification - Technical Error Encountered for Slide- ${barcode}'
      body: |
        Dear Team,
        
        We would like to inform you that the enrichment process for slide with Barcode- ${barcode} has failed due to a technical error.
        
        Error Code: [ET_305]
        
        To resolve this issue, please reach out to our technical support team at [insert support contact information]. They will assist you in diagnosing and addressing the error promptly.
        
        We apologize for any inconvenience this may have caused and appreciate your cooperation.
        
        If you have any further questions, feel free to contact us.
        
        Best regards,
        Digital Pathology Team
    MISSING_BARCODE:
      subject: 'Enrichment Notification - Process Failure Notification – Barcode Not Available for Slide'
      body: |
        Dear Team,
        
        We would like to inform you that the enrichment process for slide has failed as the Barcode value for the slide is missing in the metadata.
        
        To resolve this issue, please reach out to our support team at [insert support contact information]. They will assist you in diagnosing and addressing the error promptly.
        
        We apologize for any inconvenience this may have caused and appreciate your cooperation.
        
        If you have any further questions, feel free to contact us.
        
        Best regards,
        Digital Pathology Team'
