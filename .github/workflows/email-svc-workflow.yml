name: Email Service Deployment

on:
  push:
      
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev, qa, staging, prod)'
        required: true
        default: 'qa'

permissions:
  contents: read
  id-token: 'write'

env:
  IMAGE_NAME: email_svc-image
  REPO_NAME: email-svc
  REGION: us-central1
  CONTAINER: email_svc

jobs:      
  sonarqube:
    if: github.ref == 'refs/heads/main'
    environment: ${{ github.event.inputs.environment || 'qa' }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'qa' }}
    runs-on: [self-hosted, dev]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: 'temurin'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
          
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install jq
        run: sudo apt-get install -y jq
          
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_EMAILSVC }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
             mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
             -Dsonar.projectKey="email-service" \
             -Dsonar.projectName="email-service" \
             -Dsonar.token=${{ secrets.SONAR_TOKEN_EMAILSVC }} \
             -Dsonar.sources=src/main/java \
             -Dsonar.java.binaries=target/classes \
             -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Show coverage in console
        run: |
          LINE=$(grep 'counter type="INSTRUCTION"' target/site/jacoco/jacoco.xml | head -1)
      
          COVERED=$(echo "$LINE" | awk -F'covered="' '{print $2}' | awk -F'"' '{print $1}')
          MISSED=$(echo "$LINE" | awk -F'missed="' '{print $2}' | awk -F'"' '{print $1}')
      
          TOTAL=$((COVERED + MISSED))
          if [ "$TOTAL" -eq 0 ]; then
            echo "No instructions found in jacoco.xml"
            exit 1
          fi
          
          PERCENT=$((100 * COVERED / TOTAL))
      
          echo "Code Coverage for branch ${GITHUB_REF_NAME}: ${PERCENT}%"

      - name: SonarQube Quality Gate
        env:
          PROJECT_KEY: email-service
        run: |
          gate_resp=$(curl -s -u "${{ secrets.SONAR_TOKEN_EMAILSVC }}:" "http://10.201.8.39:9000/api/qualitygates/project_status?projectKey=email-service")
          echo "Quality Gate API Response:"
          echo "$gate_resp" | jq .
          echo "::endgroup::"

          # 2) Print ALL conditions as a human-readable table in logs
          echo "::group::Quality Gate Conditions (All)"
          echo "$gate_resp" | jq -r '
            .projectStatus.conditions[]
            | [.metricKey, .status, (.comparator // ""), (.errorThreshold // ""), (.actualValue // "N/A")]
            | @tsv
          ' | awk 'BEGIN{FS="\t"; printf "%-35s %-8s %-3s %-10s %-10s\n","metricKey","status","op","threshold","actual"} \
                  { printf "%-35s %-8s %-3s %-10s %-10s\n",$1,$2,$3,$4,$5 }'
          echo "::endgroup::"

          # 3) Summarize into the GitHub job summary
          {
            echo "## SonarQube Quality Gate"
            echo ""
            echo "**Project Key:** \`${PROJECT_KEY}\`  "
            echo "**Overall Gate (reported by Sonar):** \`$(echo "$gate_resp" | jq -r .projectStatus.status)\`  "
            echo ""
            echo "### Conditions"
            echo ""
            echo "| metricKey | status | comparator | threshold | actual |"
            echo "|---|---|---:|---:|---:|"
            echo "$gate_resp" | jq -r '
              .projectStatus.conditions[]
              | [ .metricKey, .status, (.comparator // ""), (.errorThreshold // ""), (.actualValue // "N/A") ]

              | @tsv
            ' | awk 'BEGIN{FS="\t"} {printf "| %s | %s | %s | %s | %s |\n",$1,$2,$3,$4,$5}'
            echo ""
            echo "### CI enforcement policy"
            echo ""
            echo "- Fail only if **these New Code conditions** are failing:"
            echo "  - \`new_blocker_violations\`"
            echo "  - \`new_critical_violations\`"
            echo "  - \`new_major_violations\` *(optional; remove if you want only Blocker+Critical)*"
            echo "  - \`new_coverage\` (coverage threshold is maintained in Sonar UI)"
            echo ""
            echo "- Ignore generic \`new_violations\` to avoid failing on Minor/Info."
          } >> "$GITHUB_STEP_SUMMARY"

          fail_count=$(echo "$gate_resp" | jq '
            [.projectStatus.conditions[]
              | select(.status != "OK")
              | select(
                  .metricKey == "new_blocker_violations" or
                  .metricKey == "new_critical_violations" or
                  .metricKey == "new_major_violations" or
                  .metricKey == "new_coverage"
                )
            ] | length
          ')

          if [ "$fail_count" -gt 0 ]; then
            echo "::error::Failing due to one or more of: new_blocker_violations, new_critical_violations, new_major_violations, or new_coverage."
            exit 1
          fi
          echo "Gate inspected. No failing high-severity conditions and coverage rule satisfied (per Sonar gate)."

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'qa' }}
    needs: sonarqube
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean package -Dmaven.test.skip=true

      - name: Save build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emailsvc-artifacts
          path: target/*.jar
          retention-days: 1
       
  dockerize:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'qa' }}
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create target directory
        run: mkdir -p target/

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: emailsvc-artifacts
          path: target/

      - id: auth
        uses: google-github-actions/auth@v2.0.0  
        with:
          workload_identity_provider: '${{ secrets.WORKLOAD_ID }}'
          service_account: '${{ secrets.SVC_ACCOUNT }}'

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ github.run_number }} .

      - name: Save Docker image
        run: |
          docker save ${{ env.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ github.run_number }} | gzip > email_svc-docker.tar.gz
        
      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ./email_svc-docker.tar.gz
          retention-days: 1

  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'qa' }}
    needs: [dockerize]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: ./
        
      - name: Load Docker image
        run: |
          gunzip -c email_svc-docker.tar.gz | docker load

      - id: auth
        uses: google-github-actions/auth@v2.0.0  
        with:
          workload_identity_provider: '${{ secrets.WORKLOAD_ID }}'
          service_account: '${{ secrets.SVC_ACCOUNT }}'

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Push Docker image to GCP
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ github.run_number }}

  docker_deploy:
    if: github.ref == 'refs/heads/main'    
    runs-on: [self-hosted, qa]
    environment: ${{ github.event.inputs.environment || 'qa' }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'qa' }}
    needs: [publish]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2.0.0
        with:
          workload_identity_provider: '${{ secrets.WORKLOAD_ID }}'
          service_account: '${{ secrets.SVC_ACCOUNT }}'

      - name: Configure kubectl
        run: |
          export USE_GKE_GCLOUD_AUTH_PLUGIN=True
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER }} \
            --region ${{ env.REGION }} \
            --project ${{ vars.PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=${{ github.ref_name }}-${{ github.run_number }}" >> $GITHUB_ENV
    
      - name: Fetch TLS from Vault and Create K8s Secret
        run: |        
          export VAULT_ADDR="http://10.201.16.211:8200"          
          TOKEN="$(kubectl get secret vault-init-secrets -n vault -o jsonpath='{.data.root-token}' | base64 -d)"
          vault login -method=token token="$TOKEN" >/dev/null
          
          vault kv get -field=tls.crt secret/eh-svc-tls/dicom-proxy > proxy.crt
          vault kv get -field=tls.key secret/eh-svc-tls/dicom-proxy > proxy.key

          kubectl create secret tls proxy-tls \
          --cert=proxy.crt \
          --key=proxy.key \
          -n dicomproxysvc-ns \
          --dry-run=client -o yaml | kubectl apply -f -
          
      - name: Render manifests with IMAGE_TAG
        run: |
          # Substitute environment variables into kustomization.yaml
          envsubst < overlays/${{ env.ENVIRONMENT }}/kustomization.yaml > overlays/${{ env.ENVIRONMENT }}/kustomization.yaml.tmp
          mv overlays/${{ env.ENVIRONMENT }}/kustomization.yaml.tmp overlays/${{ env.ENVIRONMENT }}/kustomization.yaml
          kubectl apply -k overlays/${{ env.ENVIRONMENT }}

  clean_artifact:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'qa' }}
    needs: [build, dockerize, publish, docker_deploy]
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Delete artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
              emailsvc-artifacts
              docker-image