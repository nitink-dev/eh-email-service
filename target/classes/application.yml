spring:
  application:
    name: eh-email-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://10.201.8.192:8888}"
  cloud:
    bus:
      enabled: true

    stream:
      kafka:
        binder:
          producer-properties:
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: org.apache.kafka.common.serialization.ByteArraySerializer

management:
  endpoints:
    web:
      exposure:
        include: busrefresh, refresh, health, info, loggers, env
  endpoint:
    loggers:
      enabled: true

email:
  templates:
    ENTITY_CHANGE_DEFAULT:
      subject: '${entityType} Configuration Updated'
      body: |
        Hi,

        The following changes were made to ${entityType}:

        ${changes}

        Yours sincerely,
        Digital Pathology Team